spring.application.name=airline-tickets
# По умолчанию LAB1 (память). Для LAB2/LAB3 активируйте профиль lab2 или lab3.
spring.profiles.default=lab1
# Spring Boot 4: пакеты автоконфигурации другие, чем в Boot 3. Строка ниже дублирует смысл Lab1AutoConfiguration.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
