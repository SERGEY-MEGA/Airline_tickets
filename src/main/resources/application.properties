spring.application.name=airline-tickets
# Default runtime mode: PostgreSQL + Flyway.
# Use the memory profile only for local startup without a database.
spring.profiles.default=postgres

# HTTP settings can be overridden from Docker Compose or the shell.
server.port=${SERVER_PORT:8080}
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:200}
server.tomcat.threads.max=${TOMCAT_MAX_THREADS:200}

# Swagger/OpenAPI for LAB6 checks.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
