# LAB3 profile: приложение работает с PostgreSQL, а схема и тестовые данные создаются Flyway.
spring.autoconfigure.exclude=

# Подключение к БД.
# Локально используется localhost, а в Docker Compose значение DB_URL переопределяется на postgres:5432.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/airline_tickets}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# В LAB3 Hibernate не создаёт таблицы сам, а только проверяет, что схема уже есть.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# data.sql в LAB3 не используется, потому что данные вставляются через Flyway migration V2.
spring.sql.init.mode=never

# Flyway применяет SQL-файлы из src/main/resources/db/migration.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# baseline нужен для безопасного запуска на уже существующей учебной БД.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
