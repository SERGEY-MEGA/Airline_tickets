# PostgreSQL profile: application uses PostgreSQL, and schema plus demo data come from Flyway.
spring.autoconfigure.exclude=

# Database connection.
# LAB7 default target is the dedicated DB node hl12.zil with the training database hl5.
# In Docker Compose these values are overridden to the local postgres service.
spring.datasource.url=jdbc:postgresql://${DBHOST:hl12.zil}:${DBPORT:5432}/${DBNAME:hl5}?currentSchema=${SCHEMANAME:hl5}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Hibernate does not create tables here; it only validates the existing schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# Demo data is inserted by Flyway migration V2.
spring.sql.init.mode=never

# Flyway applies SQL files from src/main/resources/db/migration.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# baseline allows safe startup on an already existing training database.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
