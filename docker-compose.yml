services:
  postgres:
    image: postgres:17-alpine
    container_name: airline-tickets-postgres
    environment:
      POSTGRES_DB: airline_tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airline_tickets"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
